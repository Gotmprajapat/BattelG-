<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleG - Profile</title>

<link rel="stylesheet" href="css/profile.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<a href="home.html">
<i class="fa-solid fa-arrow-left"></i>
</a>

<h2>Profile</h2>

<div></div>

</header>

<section class="profileCard">

<img src="assets/logo.png" class="profileLogo">

<h2 id="userName">Player</h2>

<p id="userEmail">player@email.com</p>

<div class="walletBox">

<i class="fa-solid fa-wallet"></i>

₹ <span id="walletBalance">0.00</span>

</div>

</section>

<section class="stats">

<div class="statBox">

<h4>Total Deposit</h4>

<span id="totalDeposit">₹0</span>

</div>

<div class="statBox">

<h4>Total Withdraw</h4>

<span id="totalWithdraw">₹0</span>

</div>

<div class="statBox">

<h4>Total Winning</h4>

<span id="totalWinning">₹0</span>

</div>

<div class="statBox">

<h4>Played</h4>

<span id="totalPlayed">0</span>

</div>

<div class="statBox">

<h4>Won</h4>

<span id="totalWon">0</span>

</div>

</section>

<section class="profileMenu">

<div class="menuItem">

<label>Referral Code</label>

<div class="copyRow">

<input id="referralCode" readonly>

<button id="copyReferral">

Copy

</button>

</div>

</div>

<div class="menuItem">

<label>UPI ID</label>

<input
id="upi"
placeholder="Enter UPI ID">

<button id="saveUPI">

Save UPI

</button>

</div>

</section>

<section class="support">

<h3>Customer Support</h3>

<a href="mailto:gotmprajapat00@gmail.com" class="supportBtn">

<i class="fa-solid fa-envelope"></i>

Email Support

</a>

<a href="https://t.me/Gotmprajapat" target="_blank" class="supportBtn">

<i class="fa-brands fa-telegram"></i>

Telegram Support

</a>

</section>

<section class="about">

<a href="privacy.html">

<i class="fa-solid fa-shield-halved"></i>

Privacy Policy

</a>

<a href="terms.html">

<i class="fa-solid fa-file-lines"></i>

Terms & Conditions

</a>

<div class="version">

Version 1.0.0

</div>

</section>

<button id="logoutBtn">

Logout

</button>

<script type="module" src="js/profile.js"></script>

</body>

</html>
