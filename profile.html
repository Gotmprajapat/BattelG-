<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - BattleG</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="page-header">
            <button onclick="history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Profile</h2>
        </header>

        <div class="profile-card">
            <div class="avatar-section">
                <div class="avatar" id="avatarInitial">P</div>
                <h3 id="profileName">Player</h3>
                <p id="profileEmail">email@example.com</p>
            </div>
            
            <div class="info-section">
                <div class="info-item">
                    <span class="info-label">Wallet Balance</span>
                    <span class="info-value" id="profileWallet">₹0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Referral Code</span>
                    <span class="info-value" id="profileRefCode">------</span>
                </div>
                <div class="info-item">
                    <span class="info-label">UPI ID</span>
                    <span class="info-value" id="profileUpi">Not Set</span>
                </div>
            </div>

            <button class="edit-btn" onclick="editProfile()">
                <i class="fas fa-edit"></i> Edit Profile
            </button>
            
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Leaderboard</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="profile.js"></script>
</body>
</html>
