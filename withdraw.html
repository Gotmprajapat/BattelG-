<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleG - Withdraw</title>

<link rel="stylesheet" href="css/withdraw.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<a href="wallet.html">
<i class="fa-solid fa-arrow-left"></i>
</a>

<h2>Withdraw</h2>

<div></div>

</header>

<section class="walletCard">

<h3>Available Balance</h3>

<h1>₹ <span id="walletBalance">0.00</span></h1>

</section>

<section class="withdrawForm">

<label>UPI ID</label>

<input
type="text"
id="upi"
placeholder="Enter UPI ID">

<label>Withdraw Amount (₹)</label>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<button id="withdrawBtn">

Submit Withdraw Request

</button>

</section>

<section class="rules">

<h3>Withdraw Rules</h3>

<ul>

<li>Minimum Withdraw ₹50</li>

<li>Wallet balance should be sufficient.</li>

<li>Payment will be sent after admin approval.</li>

<li>Wrong UPI ID may cause payment failure.</li>

</ul>

</section>

<script type="module" src="js/withdraw.js"></script>

</body>

</html>
