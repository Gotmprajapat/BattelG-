<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - BattleG</title>
    <link rel="stylesheet" href="withdraw.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="page-header">
            <button onclick="history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Withdraw</h2>
        </header>

        <div class="withdraw-card">
            <div class="balance-display">
                <span>Available Balance</span>
                <h3 id="availBalance">₹0</h3>
            </div>

            <div class="input-group">
                <label>UPI ID</label>
                <input type="text" id="upiId" placeholder="example@upi">
            </div>

            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="withdrawAmount" placeholder="Enter amount" min="50">
            </div>

            <div class="info-row">
                <span>Minimum Withdrawal:</span>
                <span>₹50</span>
            </div>
            <div class="info-row">
                <span>Processing Time:</span>
                <span>24-48 Hours</span>
            </div>

            <button class="submit-btn" onclick="submitWithdraw()">
                <i class="fas fa-paper-plane"></i> Submit Withdrawal
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="withdraw.js"></script>
</body>
</html>
