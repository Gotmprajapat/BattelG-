<header class="header">

<a href="home.html">

<i class="fa-solid fa-arrow-left"></i>

</a>

<h2>Wallet</h2>

<div class="promoBox">

type="text"
id="promoCode"
placeholder="Enter Promo Code">

</button>

</a>

<i class="fa-solid fa-house"></i>
