<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - BattleG</title>
    <link rel="stylesheet" href="wallet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="page-header">
            <button onclick="history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>My Wallet</h2>
        </header>

        <div class="balance-card">
            <p class="balance-label">Available Balance</p>
            <h1 class="balance-amount" id="balanceAmount">₹0</h1>
            <div class="balance-actions">
                <button class="action-btn deposit-btn" onclick="window.location.href='deposit.html'">
                    <i class="fas fa-plus-circle"></i> Deposit
                </button>
                <button class="action-btn withdraw-btn" onclick="window.location.href='withdraw.html'">
                    <i class="fas fa-minus-circle"></i> Withdraw
                </button>
            </div>
        </div>

        <div class="promo-section">
            <div class="promo-input-group">
                <input type="text" id="promoCode" placeholder="Enter Promo Code">
                <button onclick="applyPromoCode()">Apply</button>
            </div>
        </div>

        <section class="transactions-section">
            <h3 class="section-title">Transaction History</h3>
            <div id="transactionsList" class="transactions-list">
                <!-- Filled via JS -->
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Leaderboard</span>
        </a>
        <a href="wallet.html" class="nav-item active">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="wallet.js"></script>
</body>
</html>
