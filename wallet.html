<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleG Wallet</title>

<link rel="stylesheet" href="css/wallet.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<a href="home.html">

<i class="fa-solid fa-arrow-left"></i>

</a>

<h2>Wallet</h2>

<div></div>

</header>

<section class="walletCard">

<h3>Total Wallet Balance</h3>

<h1>₹ <span id="walletBalance">0.00</span></h1>

</section>

<section class="actionButtons">

<a href="deposit.html" class="btn deposit">

<i class="fa-solid fa-plus"></i>

Deposit

</a>

<a href="withdraw.html" class="btn withdraw">

<i class="fa-solid fa-money-bill-transfer"></i>

Withdraw

</a>

</section>

<section class="promoSection">

<h2>Promo Code</h2>

<div class="promoBox">

<input
type="text"
id="promoCode"
placeholder="Enter Promo Code">

<button id="applyPromo">

Apply

</button>

</div>

</section>

<section class="history">

<h2>Transaction History</h2>

<div id="historyContainer">

<p class="empty">

No Transactions Found

</p>

</div>

</section>

<script type="module" src="js/wallet.js"></script>

</body>

</html>
