<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleG Wallet</title>

<link rel="stylesheet" href="css/wallet.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<h2>💰 Wallet</h2>

<div class="walletBalance">

₹ <span id="walletBalance">0</span>

</div>

</header>

<div class="cards">

<div class="card">

<h3>Total Winnings</h3>

<h1 id="totalWinning">₹0</h1>

</div>

<div class="card">

<h3>Total Withdraw</h3>

<h1 id="totalWithdraw">₹0</h1>

</div>

<div class="card">

<h3>Pending Withdraw</h3>

<h1 id="pendingWithdraw">₹0</h1>

</div>

</div>

<div class="actionGrid">

<button onclick="location.href='deposit.html'">

💳 Deposit

</button>

<button onclick="location.href='withdraw.html'">

💸 Withdraw

</button>

<button onclick="location.href='promocode.html'">

🎁 Promo Code

</button>

<button onclick="location.href='history.html'">

📜 Transactions

</button>

</div>

<h2 class="title">

Recent Transactions

</h2>

<div id="transactionList">

Loading...

</div>

<nav class="bottomNav">

<a href="home.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a href="wallet.html" class="active">

<i class="fa-solid fa-wallet"></i>

<span>Wallet</span>

</a>

<a href="leaderboard.html">

<i class="fa-solid fa-ranking-star"></i>

<span>Leaderboard</span>

</a>

<a href="profile.html">

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</a>

</nav>

</html>
