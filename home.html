<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - BattleG</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <img src="assets/logo.png" alt="BattleG" class="header-logo">
                <div>
                    <span class="welcome-text">Welcome,</span>
                    <span class="user-name" id="displayName">Player</span>
                </div>
            </div>
            <div class="wallet-badge" id="walletBadge" onclick="window.location.href='wallet.html'">
                <i class="fas fa-wallet"></i>
                <span id="walletBalance">₹0</span>
            </div>
        </header>

        <!-- Banner Slider -->
        <div class="banner-slider" id="bannerSlider">
            <div class="banner active">
                <div class="banner-content">
                    <span class="banner-tag">MEGA EVENT</span>
                    <h2>Grand Tournament</h2>
                    <p>Win upto ₹10,000</p>
                </div>
            </div>
            <div class="banner">
                <div class="banner-content">
                    <span class="banner-tag">NEW GAME</span>
                    <h2>Aim Challenge</h2>
                    <p>Test your precision</p>
                </div>
            </div>
            <div class="banner">
                <div class="banner-content">
                    <span class="banner-tag">FESTIVAL</span>
                    <h2>Diwali Special</h2>
                    <p>Double rewards inside</p>
                </div>
            </div>
            <div class="banner-dots">
                <span class="dot active" onclick="changeBanner(0)"></span>
                <span class="dot" onclick="changeBanner(1)"></span>
                <span class="dot" onclick="changeBanner(2)"></span>
            </div>
        </div>

        <!-- Quick Menu -->
        <div class="quick-menu">
            <div class="quick-item" onclick="window.location.href='referral.html'">
                <div class="quick-icon">
                    <i class="fas fa-users"></i>
                </div>
                <span>Referral</span>
            </div>
            <div class="quick-item" onclick="window.location.href='my-tournaments.html'">
                <div class="quick-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <span>My Tournaments</span>
            </div>
        </div>

        <!-- Games Section -->
        <section class="games-section">
            <h3 class="section-title">
                <i class="fas fa-gamepad"></i> Games
            </h3>
            <div class="games-scroll" id="gamesScroll">
                <!-- Games added via JS -->
            </div>
        </section>

        <!-- Today's Top Earners -->
        <section class="top-earners-section">
            <h3 class="section-title">
                <i class="fas fa-crown"></i> Top Earners Today
            </h3>
            <div class="earners-list" id="earnersList">
                <!-- Filled via JS -->
            </div>
        </section>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Leaderboard</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="home.js"></script>
</body>
</html>
