<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit | BattelG</title>

<link rel="stylesheet" href="css/deposit.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>💳 Deposit</h1>

<div class="qr-box">

<img src="assets/qr.png" alt="QR Code" class="qr">

<p>Scan QR and Pay</p>

</div>

<input
type="number"
id="amount"
placeholder="Enter Amount (₹10 - ₹1000)"
>

<input
type="text"
id="utr"
placeholder="Enter UTR Number"
>

<button id="submitDeposit">
Submit Deposit Request
</button>

</div>

<script type="module" src="js/deposit.js"></script>

</body>
</html>
