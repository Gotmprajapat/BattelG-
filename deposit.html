<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleG - Deposit</title>

<link rel="stylesheet" href="css/deposit.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<a href="wallet.html">

<i class="fa-solid fa-arrow-left"></i>

</a>

<h2>Deposit</h2>

<div></div>

</header>

<section class="depositCard">

<h3>Scan QR & Pay</h3>

<img src="assets/qr.png" class="qrImage">

<p>
Scan this QR code and complete your payment.
</p>

</section>

<section class="depositForm">

<label>Amount (₹)</label>

<input
type="number"
id="amount"
placeholder="Enter Deposit Amount">

<label>UTR / Transaction ID</label>

<input
type="text"
id="utr"
placeholder="Enter UTR Number">

<button id="submitDeposit">

Submit Deposit Request

</button>

</section>

<section class="notice">

<h3>Important</h3>

<ul>

<li>Minimum Deposit ₹10</li>

<li>Enter correct UTR Number.</li>

<li>Wallet updates only after admin approval.</li>

<li>Wrong UTR may lead to rejection.</li>

</ul>

</section>

<script type="module" src="js/deposit.js"></script>

</body>

</html>
