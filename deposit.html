<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleG Deposit</title>

<link rel="stylesheet" href="css/deposit.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="header">

<h2>💳 Deposit Money</h2>

</div>

<div class="walletCard">

<h3>Current Wallet</h3>

<h1>₹<span id="walletBalance">0</span></h1>

</div>

<div class="depositCard">

<label>Deposit Amount</label>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<label>BattleG UPI ID</label>

<div class="upiBox">

<input
type="text"
id="upiId"
readonly>

<button id="copyUpi">

Copy

</button>

</div>

<div class="qrBox">

<img
id="qrImage"
src="images/upiqr.png">

</div>

<label>UTR Number</label>

<input
type="text"
id="utr"
placeholder="Enter UTR Number">

<label>Payment Screenshot</label>

<input
type="file"
id="paymentScreenshot"
accept="image/*">

<p class="note">

Minimum Deposit ₹20<br>

Deposit Approval Time : 5-15 Minutes

</p>

<button id="depositBtn">

Submit Deposit

</button>

</div>

<nav class="bottomNav">

<a href="home.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a href="wallet.html">

<i class="fa-solid fa-wallet"></i>

<span>Wallet</span>

</a>

<a href="leaderboard.html">

<i class="fa-solid fa-ranking-star"></i>

<span>Leaderboard</span>

</a>

<a href="profile.html">

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</a>

</nav>

<script type="module" src="js/deposit.js"></script>

</body>

</html>
